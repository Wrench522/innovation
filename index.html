<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
  body {
    font-family: Arial;
    background: #a39999;
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
  }

  .login-box {
    background: rgb(79, 84, 87);
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #0a74da;
    color: white;
    border: none;
    cursor: pointer;
  }

  button:hover {
    background: #095bb5;
  }
</style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <form id="loginForm">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  let formData = new FormData(this);

  fetch("login.php", {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(data => {
    if(data === "success"){
      alert("Login successful");
      window.location.href = "dashboard.html";
    } else {
      alert("Invalid username or password");
    }
  });
});
</script>

</body>
</html>
